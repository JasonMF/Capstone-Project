<html lang='en'>
  <head>
    <meta charset='utf-8' />
    <link rel="stylesheet" href="style.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
  </head>
  <body>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="home.html">About</a></li>
    </ul>

    <div id='calendar'></div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');

        // 1. LOAD EVENTS FROM LOCAL STORAGE
        // Check if 'calendarEvents' exists in localStorage. 
        // If it does, parse it; if not, use your default sample events.
        let localEvents = localStorage.getItem('calendarEvents');
        let initialEvents = localEvents ? JSON.parse(localEvents) : [
          { title: 'Project Launch', start: '2026-05-15' },
          { title: 'Meeting', start: '2026-05-20' }
        ];

        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek'
          },
          
          navLinks: true, 
          
          dateClick: function(info) {
            let eventTitle = prompt('Enter Event Title for ' + info.dateStr + ':');
            
            if (eventTitle) {
              // Add event to the calendar display
              calendar.addEvent({
                title: eventTitle,
                start: info.dateStr,
                allDay: true
              });

              // 2. SAVE UPDATED EVENTS TO LOCAL STORAGE
              // Fetch all current events from FullCalendar
              let allEvents = calendar.getEvents().map(function(event) {
                return {
                  title: event.title,
                  start: event.startStr, // FullCalendar stores dates cleanly as strings here
                  allDay: event.allDay
                };
              });

              // Convert the array to a string and save it
              localStorage.setItem('calendarEvents', JSON.stringify(allEvents));
              
              alert('Event saved to the browser!');
            }
          },

          // Inject our loaded events here
          events: initialEvents
        });
        
        calendar.render();
      });
    </script>
  </body>
</html>
